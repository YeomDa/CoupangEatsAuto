name: 쿠팡이츠 정산 알림 봇

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  settlement-notify:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Chrome 및 ChromeDriver 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            chromium-chromedriver \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 정산 봇 실행
        env:
          COUPANGEATS_ID: ${{ secrets.COUPANGEATS_ID }}
          COUPANGEATS_PW: ${{ secrets.COUPANGEATS_PW }}
        run: python controller.py
